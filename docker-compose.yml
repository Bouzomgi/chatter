services:
  frontend:
    build:
      context: .
      target: client-production
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: .
      target: server-production
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatter
      POSTGRES_USER: chatter
      POSTGRES_PASSWORD: chatter
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "chatter"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
