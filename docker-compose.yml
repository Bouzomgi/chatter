services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    environment:
      DEPLOY_SECRET: ${DEPLOY_SECRET:-}
    volumes:
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - ./docker/nginx/upstream.conf:/etc/nginx/conf.d/upstream.conf:ro
    depends_on:
      red:
        condition: service_healthy

  red:
    image: ghcr.io/bouzomgi/chatter-server:latest
    build:
      context: .
      target: server-production
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://chatter:chatter@postgres:5432/chatter
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEPLOY_SECRET: ${DEPLOY_SECRET:-}
      SEED: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"] # Alpine: wget, not curl
      interval: 10s
      timeout: 5s
      retries: 3

  # black has a profile so it does not start on plain `docker compose up -d`.
  # red has no profile because it is the default active slot on fresh deploys.
  # deploy.sh manages which slot is live at any given time.
  black:
    image: ghcr.io/bouzomgi/chatter-server:latest
    build:
      context: .
      target: server-production
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://chatter:chatter@postgres:5432/chatter
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEPLOY_SECRET: ${DEPLOY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"] # Alpine: wget, not curl
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - black

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chatter
      POSTGRES_USER: chatter
      POSTGRES_PASSWORD: chatter
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "chatter"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
