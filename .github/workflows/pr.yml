name: PR

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatter_test
          POSTGRES_USER: chatter
          POSTGRES_PASSWORD: chatter
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with: { version: 9.15.4 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter server exec prisma generate
      - run: pnpm typecheck
      - run: pnpm --filter client run lint
      - run: pnpm --filter server exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://chatter:chatter@localhost:5432/chatter_test
      - run: pnpm --filter server run db:seed
        env:
          DATABASE_URL: postgresql://chatter:chatter@localhost:5432/chatter_test
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://chatter:chatter@localhost:5432/chatter_test
