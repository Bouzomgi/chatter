name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: chatter_test
          POSTGRES_USER: chatter
          POSTGRES_PASSWORD: chatter
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
        env:
          DATABASE_URL: postgresql://chatter:chatter@localhost:5432/chatter_test

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Cold start (bring up red)
        run: bash docker/deploy.sh
      - name: Deploy to black with E2E gate
        run: DEPLOY_HOOK="pnpm test:e2e" bash docker/deploy.sh
      - if: always()
        run: docker compose --profile black down -v

  build-and-deploy:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server-production
          platforms: linux/arm64
          push: true
          tags: ghcr.io/bouzomgi/chatter-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: client-production
          platforms: linux/arm64
          push: true
          tags: ghcr.io/bouzomgi/chatter-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Deploy to Pi (stub)
        run: echo "Pi not yet configured — wired up in Phase 5"
